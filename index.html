<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherLens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Outfit', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-attachment: fixed;
    }

    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .glass-light {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-input:focus { outline: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .loading { animation: pulse-soft 1.4s ease infinite; }

    .forecast-card:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 py-10">

  <div class="w-full max-w-xl">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-700 text-white tracking-tight">Weather<span class="text-indigo-400">Lens</span></h1>
      <p class="text-white/40 text-sm mt-1">Real-time weather, anywhere.</p>
    </div>

    <!-- Search -->
    <div class="glass rounded-2xl p-3 flex gap-2 mb-6">
      <input
        id="searchInput"
        type="text"
        placeholder="Search city... e.g. Lahore"
        class="search-input flex-1 bg-transparent text-white text-base px-3 py-2"
        onkeydown="if(event.key==='Enter') fetchWeather()"
      />
      <button
        onclick="fetchWeather()"
        class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold px-5 py-2 rounded-xl transition-all duration-200 text-sm"
      >
        Search
      </button>
    </div>

    <!-- Error Message -->
    <div id="errorBox" class="hidden text-center text-red-400 glass rounded-2xl px-4 py-3 mb-6 text-sm">
      City not found. Please try again.
    </div>

    <!-- Weather Card -->
    <div id="weatherCard" class="hidden glass rounded-3xl p-7 mb-5 fade-up">

      <!-- City + Date -->
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 id="cityName" class="text-3xl font-semibold text-white"></h2>
          <p id="dateText" class="text-white/40 text-sm mt-1"></p>
        </div>
        <img id="weatherIcon" src="" alt="icon" class="w-16 h-16" />
      </div>

      <!-- Temp + Description -->
      <div class="mb-8">
        <div class="text-7xl font-300 text-white" id="tempText"></div>
        <p id="descText" class="text-indigo-300 text-lg mt-1"></p>
        <p class="text-white/40 text-sm mt-1">Feels like <span id="feelsLike"></span></p>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-3 gap-3">
        <div class="glass-light rounded-2xl p-4 text-center">
          <p class="text-white/40 text-xs uppercase tracking-widest mb-1">Humidity</p>
          <p id="humidity" class="text-white font-semibold text-lg"></p>
        </div>
        <div class="glass-light rounded-2xl p-4 text-center">
          <p class="text-white/40 text-xs uppercase tracking-widest mb-1">Wind</p>
          <p id="wind" class="text-white font-semibold text-lg"></p>
        </div>
        <div class="glass-light rounded-2xl p-4 text-center">
          <p class="text-white/40 text-xs uppercase tracking-widest mb-1">Visibility</p>
          <p id="visibility" class="text-white font-semibold text-lg"></p>
        </div>
      </div>
    </div>

    <!-- Forecast -->
    <div id="forecastCard" class="hidden glass rounded-3xl p-6 fade-up">
      <h3 class="text-white/50 text-xs uppercase tracking-widest mb-4">5-Step Forecast</h3>
      <div id="forecastList" class="flex flex-col gap-2"></div>
    </div>

    <!-- Placeholder -->
    <div id="placeholder" class="text-center text-white/20 mt-16">
      <div class="text-5xl mb-3">🌤</div>
      <p class="text-sm">Search a city to see weather</p>
    </div>

  </div>
<script>
  const WEATHER_KEY = "YOUR_OPENWEATHER_API_KEY";
const BASE = "https://api.openweathermap.org/data/2.5";

async function fetchWeather() {
  const city = document.getElementById("searchInput").value.trim();
  if (!city) return;
  hideAll();
  showLoading();

  try {
    const [weatherRes, forecastRes] = await Promise.all([
      fetch(`${BASE}/weather?q=${city}&appid=${WEATHER_KEY}&units=metric`),
      fetch(`${BASE}/forecast?q=${city}&appid=${WEATHER_KEY}&units=metric&cnt=5`)
    ]);

    hideLoading();

    if (!weatherRes.ok) { showError("City not found. Please try again."); return; }

    const weather = await weatherRes.json();
    const forecast = await forecastRes.json();

    renderWeather({
      city: weather.name,
      country: weather.sys.country,
      temperature: Math.round(weather.main.temp),
      feels_like: Math.round(weather.main.feels_like),
      humidity: weather.main.humidity,
      description: weather.weather[0].description,
      icon: weather.weather[0].icon,
      wind_speed: weather.wind.speed,
      visibility: (weather.visibility || 0) / 1000,
    });

    renderForecast(forecast.list.map(item => ({
      time: item.dt_txt,
      temperature: Math.round(item.main.temp),
      description: item.weather[0].description,
      icon: item.weather[0].icon,
    })));

  } catch (e) {
    hideLoading();
    showError("Something went wrong. Please try again.");
  }
}
</script>
</body>
</html>
